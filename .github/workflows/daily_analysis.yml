name: Daily Stock Analysis Engine

on:
  schedule:
    # TSİ 16:35'e denk gelmesi için UTC saatiyle 13:35 olarak ayarlandı (Yaz/Kış durumuna göre UTC+3)
    - cron: '35 13 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd borsa-engine
          npm install

      - name: Run Analysis Engine
        run: |
          cd borsa-engine
          npm run start:analysis
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
